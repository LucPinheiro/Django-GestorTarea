{% extends 'tareas/base.html' %}

{% block content %}

<div class="detalle-card">

    <div class="confirmar-eliminar-box">

        <h3>Importar CSV</h3>

        <form method="post"
              enctype="multipart/form-data">

            {% csrf_token %}

            <div class="mb-4">

                <label class="form-label fw-semibold mb-3">
                    Selecciona un archivo CSV
                </label>

                <input type="file"
                       name="archivo_csv"
                       class="form-control">

            </div>

            <button type="submit"
                    class="btn btn-success">
                Importar
            </button>

            <a href="{% url 'lista_tareas' %}?vista=lista"
               class="btn btn-secondary">
                Cancelar
            </a>

        </form>

    </div>

</div>

{% endblock %}
