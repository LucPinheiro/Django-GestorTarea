{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Login | Gestor de tareas
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #3a1342, #3a1342);
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .topbar {
            background-color: rgba(0,0,0,0.15);
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: white;
            font-size: 2rem;
            font-weight: bold;
            text-decoration: none;
        }

        .top-links a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            font-size: 1.1rem;
        }

        .top-links a:hover {
            opacity: 0.8;
        }

        /* LOGIN */
        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .login-title {
            text-align: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .login-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.85);
            margin-bottom: 35px;
            font-size: 1.1rem;
        }

        .form-label {
            color: white;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            height: 55px;
            border-radius: 14px;
            border: none;
            background: rgba(255,255,255,0.25);
            color: white;
            font-size: 1.05rem;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.35);
            box-shadow: none;
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.75);
        }

        .btn-login {
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 16px;
            background: white;
            color: #6b2978;
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            background: #f5f5f5;
        }

        .footer-text {
            text-align: center;
            color: rgba(255,255,255,0.85);
            margin-top: 30px;
        }

        @media (max-width: 768px) {

            .topbar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .login-title {
                font-size: 2.2rem;
            }

            .login-card {
                padding: 30px;
            }
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->
    <div class="topbar">

        <a href="#" class="logo">
             Gestor de tareas
        </a>

        <div class="top-links">

            <a href="#">
                Inicio
            </a>

            <a href="#">
                Registrarse
            </a>

        </div>

    </div>

    <!-- LOGIN -->
    <div class="login-wrapper">

        <div class="login-card">

            <h3 class="login-title">
                Iniciar sesión
            </h3>

            <form method="post">

                {% csrf_token %}

                <div class="mb-4">

                    <label class="form-label">
                        Usuario
                    </label>

                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Introduce tu usuario">

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Contraseña
                    </label>

                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Introduce tu contraseña">

                </div>

                <button type="submit"
                        class="btn-login">

                    Entrar 🚀

                </button>

            </form>

            {% if form.errors %}

            <div class="alert alert-danger mt-4">

                Usuario o contraseña incorrectos.

            </div>

            {% endif %}

            <div class="footer-text">

                   @2026 Gestor de tareas, Proyecto Django

            </div>

        </div>

    </div>

</body>

</html>
